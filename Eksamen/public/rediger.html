<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" href="redigerstyle.css">
    <script src="redigerscript.js" defer></script>
</head>
<body>
    <nav>
        <a href="/">Arrangement</a>
        <a href="/arrangoerer">Arrangører</a>
    </nav>
    <main>
        <h1>Arrangement</h1>
        <div id="popup"></div>
        <div id="splitt">
            <div id="arrangliste"></div>
            <div>
                <form id="velg">
                    <label for="velg-input">Lag ny </label>
                    <select id="velg-input">
                        <option value=""></option>
                        <option value="person">Person</option>
                        <option value="arrangør">Arrangør</option>
                        <option value="arrangement">Arrangement</option>
                        <option value="rolle">Rolle</option>
                    </select>
                </form>
                <form id="skjema-person" class="skjema">
                    <label for="fornavn">Fornavn:* </label>
                    <input id="fornavn" placeholder="Ole" required>
                    <label for="etternavn">Etternavn:* </label>
                    <input id="etternavn" placeholder="Nordmann" required>
                    <label for="epost">Epost: (valgfritt)</label>
                    <input id="epost" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$" placeholder="email@domain.com">
                    <label for="tlf">Telefonnummer: (valgfritt)</label>
                    <input id="tlf" pattern="[0-9]{8}" placeholder="98765432">
                    <input type="submit">
                </form>
                <form id="skjema-arrangør" class="skjema">
                    <label for="aø-navn">Navn:* </label>
                    <input id="aø-navn" placeholder="Båter AS" required>
                    <label for="type">Type:* </label>
                    <select id="type" required>
                        <option value="Bedrift">Bedrift</option>
                        <option value="Selskap">Selskap</option>
                        <option value="Forening">Forening</option>
                        <option value="Annen organisasjon">Annen organisasjon</option>
                        <option value="Privatperson">Privatperson</option>
                        <option value="Annet">Annet</option>
                    </select>
                    <label for="aø-beskrivelse">Beskrivelse:</label>
                    <textarea id="aø-beskrivelse" rows="3" wrap="soft"></textarea>
                    <label for="kontaktperson">Kontaktperson: </label>
                    <select id="kontaktperson">
                        <option value=""></option>
                    </select>
                    <input type="submit">
                </form>
                <form id="skjema-arrangement" class="skjema">
                    <label for="at-navn">Navn:* </label>
                    <input id="at-navn" required>
                    <label for="arrangør">Arrangør:* </label>
                    <select id="arrangør" required></select>
                    <label for="kategori">Kategori:* </label>
                    <select id="kategori" required>
                        <option value="Festival">Festival</option>
                        <option value="Filmvisning">Filmvisning</option>
                        <option value="Konsert">Konsert</option>
                        <option value="Produktlansering">Produktlansering</option>
                        <option value="Kulturell arrangement">Kulturell arrangement</option>
                        <option value="Religiøs aktivitet">Religiøs aktivitet</option>
                        <option value="Sport">Sport</option>
                        <option value="Annet">Annet</option>
                    </select>
                    <label for="at-beskrivelse">Beskrivelse:</label>
                    <textarea id="at-beskrivelse" rows="3" wrap="soft"></textarea>
                    <label for="dato">Dato:* </label>
                    <input type="date" id="dato" required>
                    <label for="tid">Tid:* </label>
                    <input type="time" id="tid" required>
                    <label for="stedsnavn">Stedsnavn:* </label>
                    <input id="stedsnavn" placeholder="Danmarksplass" required>
                    <label for="postnummer">Postnummer:</label>
                    <input id="postnummer" placeholder="5058">
                    <label for="pris">Billettpris:</label>
                    <input type="number" id="pris">
                    <label for="antall">Tilgjengelige billetter:</label>
                    <input type="number" id="antall">
                    <label for="alder">Aldersgrense:</label>
                    <input type="number" id="alder">
                    <label for="bilde">Vel bildefil</label>
                    <input type="file" name="bilde" id="bilde" accept="image/*">
                    <label for="alttekst">Legg til alttekst for bildet (valgfritt)</label>
                    <input type="text" id="alttekst" placeholder="Et bilde av en fin hund.">
                    <input type="submit">
                </form>
                <form id="skjema-rolle" class="skjema">
                    <label for="arrangement">Arrangement:* </label>
                    <select id="arrangement" required></select>
                    <label for="person">Person:* </label>
                    <select id="person" reqired></select>
                    <label for="rolle">Rolle:* </label>
                    <input id="rolle" placeholder="Medvirkende" required>
                    <input type="submit">
                </form>
            </div>
        </div>
    </main>
</body>
</html>
